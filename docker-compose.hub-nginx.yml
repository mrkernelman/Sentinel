# Standalone same-origin nginx deployment — Docker Hub images only (no
# local build, no ml/artifacts/data/ needed) + an nginx reverse proxy,
# all in ONE file. No other compose file needed — this replaces
# docker-compose.hub.yml rather than overlaying it.
#
#   docker compose -f docker-compose.hub-nginx.yml up -d
#   Dashboard: http://<any-reachable-host-or-IP>:8080  (admin/admin123)
#
# Why a separate frontend image (radio123/shadow-it-frontend) instead of
# the original jeffreyjr/shadow-it-frontend: the original was built with
# NEXT_PUBLIC_API_URL baked to an absolute host, which only works for
# clients on that one address (see CLAUDE.md "Portable Deployment").
# radio123/shadow-it-frontend is the same source rebuilt with
# NEXT_PUBLIC_API_URL="" (relative) so it works from any host once nginx
# fronts it — no local build step needed even on a fresh clone.
#
# Not available in this mode:
#   - Run Detection (needs the ~850MB CICIDS2017 CSVs; uncomment the data
#     volume below and place the CSVs in ./data to enable it)
#   - Live Scan (host-only in any Docker mode)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shadow_it_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_docker_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/immutability.sql:/docker-entrypoint-initdb.d/02-immutability.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shadow_it_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: jeffreyjr/shadow-it-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shadow_it_db
      DB_USER: shadow_it_app
      DB_PASSWORD: sh4d0w_app_2026
      JWT_SECRET: change-this-to-a-long-random-secret-for-production
      JWT_EXPIRY_HOURS: "8"
      FLASK_ENV: production
    # not published directly — only nginx is, below
    # volumes:
    #   - ./data:/app/data:ro   # CICIDS2017 CSVs — enables Run Detection

  frontend:
    image: radio123/shadow-it-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
