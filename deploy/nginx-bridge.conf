# Same-origin reverse proxy for docker-compose.yml + docker-compose.nginx.yml
# (backend on the normal compose bridge network, reachable by service name --
# NOT docker-compose.hub-nginx.yml, which runs backend with network_mode: host
# and needs deploy/nginx.conf's host.docker.internal upstream instead).
#
# Routes:
#   /api/*  -> Flask backend (compose service "backend", port 5000)
#   /*      -> Next.js frontend (compose service "frontend", port 3000)
# So the whole app is served from one origin/port — the browser never needs
# to know the backend's address, which is what lets the frontend image ship
# with NEXT_PUBLIC_API_URL="" (relative) instead of a baked-in host or IP.

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
