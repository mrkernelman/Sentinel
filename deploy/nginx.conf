# Same-origin reverse proxy for the Shadow IT Detection stack (plain HTTP).
# Alternative to deploy/Caddyfile for setups that need nginx specifically,
# or that access the dashboard by a raw IP (Caddy's automatic HTTPS needs a
# real hostname to issue a cert for; nginx here does no TLS at all).
#
# Routes:
#   /api/*  -> Flask backend (5000)
#   /*      -> Next.js frontend (3000)
# So the whole app is served from one origin/port — the browser never needs
# to know the backend's address, which is what lets the frontend image ship
# with NEXT_PUBLIC_API_URL="" (relative) instead of a baked-in host or IP.

server {
    listen 80;
    server_name _;

    location /api/ {
        # backend runs with network_mode: host (see docker-compose.hub-nginx.yml)
        # so it's no longer reachable by compose service-name DNS -- go via
        # the host gateway instead.
        proxy_pass http://host.docker.internal:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
